server:
  port: 8082

spring:
  application:
    name: course-service
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/course_db
    username: postgres
    password: postgres
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
